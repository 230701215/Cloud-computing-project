name: Build and deploy to Azure Web App - yourfileshareapp2026

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React Frontend (Vite)
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp -R dist deploy/dist
          cp -R server deploy/server
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_03F6F84C5F3D4944854FC3103706C2C0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1F46ED86893C4D30826533441DFAB047 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C552A6420CB8499C9CF6DBE39FB61587 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'yourfileshareapp2026'
          slot-name: 'Production'
          package: '.'                  # Deploy the downloaded artifact folder
